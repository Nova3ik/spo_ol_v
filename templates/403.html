{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Доступ запрещён | Простая математика</title>
  <link rel="icon" type="image/png" href="{% url 'favicon' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="error-document">
  <main class="error-standalone" aria-labelledby="error-title">
    <section class="error-panel error-panel--403">
      <div class="error-panel__backdrop" aria-hidden="true">403</div>
      <div class="error-panel__content">
        <p class="error-panel__eyebrow">Ограничение доступа</p>
        <h1 class="error-panel__title" id="error-title">Доступ запрещён</h1>
        <p class="error-panel__text">
          У вас нет прав для просмотра этой страницы. Вернитесь на главную и выберите доступный раздел сайта.
        </p>
        <a class="error-panel__button" href="{% url 'home' %}">На главную</a>
      </div>
    </section>
  </main>
</body>
</html>
